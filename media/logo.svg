<svg width="280" height="80" viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBiru" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d7fd1"/>
      <stop offset="100%" stop-color="#0b53ae"/>
    </linearGradient>
  </defs>

  <g transform="translate(59,40)">
    <!-- 8 garis sinar menembus pusat -->
    <g stroke="#0b53ae" stroke-width="3.5" stroke-linecap="round">
      <line x1="0" y1="-34" x2="0" y2="34"/>
      <line x1="-34" y1="0" x2="34" y2="0"/>
      <line x1="-24" y1="-24" x2="24" y2="24"/>
      <line x1="-24" y1="24" x2="24" y2="-24"/>
    </g>
    <!-- bentuk squircle: hijau outline + biru isi -->
    <rect x="-18" y="-18" width="36" height="36" rx="14"
          fill="url(#gradBiru)" stroke="#0a8120" stroke-width="4"/>
  </g>

  <!-- Wordmark -->
  <text x="109" y="40" dominant-baseline="central" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700" fill="#0b53ae">
    ARKA<tspan fill="#0a8120">JS</tspan>

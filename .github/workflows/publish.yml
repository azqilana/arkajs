name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Susun folder template
        run: |
          mkdir -p template
          cp -r gaya template/
          cp -r halaman template/
          cp -r rancangan template/
          cp -r logika template/
          cp -r sistem template/
          cp index.html template/

      - name: Publish ke npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
